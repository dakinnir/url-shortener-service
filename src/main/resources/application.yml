spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/urlshortener
    username: ${DB_USER:postgres}
    password: ${DB_PASS:password}
  jpa:
    hibernate:
      ddl-auto: create-drop

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus